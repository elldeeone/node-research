<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" fill="#F3EEE3"/>
  <rect x="24" y="24" width="1552" height="912" rx="28" fill="#FAF7F0" stroke="#D9D0C2" stroke-width="2"/>

  <!-- Badge -->
  <rect x="72" y="64" width="286" height="38" rx="19" fill="#4350D0"/>
  <text x="215" y="89" fill="#F8F4EC" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" text-anchor="middle">8c Relay Load Snapshot</text>

  <!-- Title -->
  <text x="72" y="160" fill="#231F1A" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">8 downstream syncs made the relay busy, not unstable</text>
  <text x="72" y="196" fill="#5D554C" font-family="Georgia, 'Times New Roman', serif" font-size="17">Hetzner CPX42 relay serving 8 cold downstream nodes while the network ran at 3K TPS.</text>

  <!-- Run Outcome card -->
  <rect x="72" y="236" width="1456" height="158" rx="24" fill="#FFFDF8" stroke="#D9D0C2" stroke-width="1.5"/>
  <text x="104" y="276" fill="#51483F" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.4">RUN OUTCOME</text>

  <rect x="104" y="300" width="180" height="56" rx="18" fill="#EAF4EC"/>
  <text x="194" y="332" fill="#1D6C43" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">25.5h</text>
  <text x="194" y="352" fill="#56705E" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">relay stayed healthy</text>

  <rect x="314" y="300" width="180" height="56" rx="18" fill="#EEF1FB"/>
  <text x="404" y="332" fill="#355E73" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">2</text>
  <text x="404" y="352" fill="#56705E" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">full prune windows</text>

  <rect x="524" y="300" width="220" height="56" rx="18" fill="#F5EFE3"/>
  <text x="634" y="332" fill="#8A6331" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">8/8</text>
  <text x="634" y="352" fill="#6F665A" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">downstream nodes served</text>

  <rect x="804" y="272" width="660" height="100" rx="18" fill="#F4F0E6" stroke="#E0D7C8" stroke-width="1"/>
  <text x="836" y="312" fill="#355E73" font-family="Arial, Helvetica, sans-serif" font-size="15">- no OOM</text>
  <text x="1070" y="312" fill="#355E73" font-family="Arial, Helvetica, sans-serif" font-size="15">- no peer collapse</text>
  <text x="836" y="348" fill="#355E73" font-family="Arial, Helvetica, sans-serif" font-size="15">- no loss of sync</text>
  <text x="1070" y="348" fill="#355E73" font-family="Arial, Helvetica, sans-serif" font-size="15">- no storage-failure shape</text>

  <!-- Metric cards -->
  <rect x="72" y="420" width="704" height="220" rx="24" fill="#FFFDF8" stroke="#D9D0C2" stroke-width="1.5"/>
  <rect x="824" y="420" width="704" height="220" rx="24" fill="#FFFDF8" stroke="#D9D0C2" stroke-width="1.5"/>
  <rect x="72" y="656" width="704" height="204" rx="24" fill="#FFFDF8" stroke="#D9D0C2" stroke-width="1.5"/>
  <rect x="824" y="656" width="704" height="204" rx="24" fill="#FFFDF8" stroke="#D9D0C2" stroke-width="1.5"/>

  <!-- RAM card -->
  <text x="104" y="466" fill="#231F1A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">RAM</text>
  <text x="104" y="492" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="14">Peak resident memory on the relay.</text>
  <text x="104" y="548" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">10.69 GiB</text>
  <rect x="104" y="568" width="300" height="22" rx="11" fill="#ECE5D8"/>
  <rect x="104" y="568" width="200" height="22" rx="11" fill="#355E73"/>
  <text x="104" y="616" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="14">About 67% of the 16 GiB box.</text>

  <!-- CPU card -->
  <text x="856" y="466" fill="#231F1A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">CPU</text>
  <text x="856" y="492" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="14">Core usage on the 8 vCPU relay.</text>
  <text x="856" y="530" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="13">p95</text>
  <rect x="856" y="542" width="420" height="28" rx="14" fill="#ECE5D8"/>
  <rect x="856" y="542" width="230" height="28" rx="14" fill="#4350D0"/>
  <text x="1098" y="562" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">4.38 cores</text>
  <text x="856" y="590" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="13">peak</text>
  <rect x="856" y="602" width="420" height="28" rx="14" fill="#ECE5D8"/>
  <rect x="856" y="602" width="324" height="28" rx="14" fill="#7A56D6"/>
  <text x="1192" y="622" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">6.17 cores</text>

  <!-- Disk reads card -->
  <text x="104" y="702" fill="#231F1A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Disk reads</text>
  <text x="104" y="728" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="14">Read/serve traffic became a major part of the relay load.</text>
  <text x="104" y="760" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="13">p95</text>
  <rect x="104" y="772" width="420" height="28" rx="14" fill="#ECE5D8"/>
  <rect x="104" y="772" width="168" height="28" rx="14" fill="#4052C8"/>
  <text x="536" y="792" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">103.65 MB/s</text>
  <text x="104" y="816" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="13">peak</text>
  <rect x="104" y="828" width="420" height="28" rx="14" fill="#ECE5D8"/>
  <rect x="104" y="828" width="420" height="28" rx="14" fill="#9267E2"/>
  <text x="536" y="848" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">259.20 MB/s</text>

  <!-- Disk writes card -->
  <text x="856" y="702" fill="#231F1A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Disk writes</text>
  <text x="856" y="728" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="14">Busy too, but not in a collapse-shaped way.</text>
  <text x="856" y="760" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="13">p95</text>
  <rect x="856" y="772" width="420" height="28" rx="14" fill="#ECE5D8"/>
  <rect x="856" y="772" width="196" height="28" rx="14" fill="#3E79B2"/>
  <text x="1288" y="792" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">169.55 MB/s</text>
  <text x="856" y="816" fill="#6A6158" font-family="Arial, Helvetica, sans-serif" font-size="13">peak</text>
  <rect x="856" y="828" width="420" height="28" rx="14" fill="#ECE5D8"/>
  <rect x="856" y="828" width="420" height="28" rx="14" fill="#355E73"/>
  <text x="1288" y="848" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">364.58 MB/s</text>

  <!-- Bottom line -->
  <rect x="72" y="878" width="1456" height="56" rx="20" fill="#F4F0E6" stroke="#E0D7C8" stroke-width="1"/>
  <text x="104" y="912" fill="#231F1A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Bottom line:</text>
  <text x="232" y="912" fill="#5D554C" font-family="Arial, Helvetica, sans-serif" font-size="15">On healthy NVMe-backed hardware, relay-serving looked much more like extra read/serve/CPU/RSS pressure than catastrophic write-path collapse.</text>
</svg>
